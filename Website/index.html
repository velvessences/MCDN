<!DOCTYPE html>
<html>
<head>
  <title>MovieStarPlanet</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
      font-family: sans-serif;
    }
    #start {
      width: 100vw;
      height: 100vh;
      background: #ff00aa;
      color: white;
      border: none;
      font-size: 48px;
      cursor: pointer;
    }
    #start:hover {
      background: #ff33bb;
    }
    #flash-container {
      width: 100vw;
      height: 100vh;
    }
    embed {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <button id="start">Click to start MovieStarPlanet</button>
  <div id="flash-container"></div>
  <script>
    document.getElementById("start").addEventListener("click", function () {
      document.getElementById("start").style.display = "none";
      document.getElementById("flash-container").innerHTML =
       //  '<embed src="https://raw.githubusercontent.com/velvessences/MCDN/main/Main_23_04.swf" ' +
       '<embed src="https://raw.githubusercontent.com/velvessences/MCDN/main/Main_20130527_172419.swf" ' +
          'type="application/x-shockwave-flash" ' +
          'width="1024" height="768" ' +
          'allowscriptaccess="always" ' +
          'allownetworking="all" ' +
          'allowfullscreen="true" ' +
          'wmode="direct" ' +
          'quality="high">';
    });
  </script>
</body>
</html>
